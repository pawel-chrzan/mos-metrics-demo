<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mos · Company Metrics — Demo</title>
<meta name="description" content="Interactive demo of the Mos Health employer Company Metrics dashboard." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;500;700;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/primeicons@7.0.0/primeicons.css" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --mos-bg:#F0E6DD; --mos-bg-card:#FDF8F3; --mos-bg-subtle:#F5EDE6; --mos-bg-hover:#EDE3D9;
    --mos-text:#4A4A4A; --mos-text-secondary:#776662; --mos-text-muted:#A59B97;
    --mos-brown:#9D8675; --mos-brown-dark:#7C716B; --mos-border:#E5DDD6;
    --mos-peach:#FFE2CC; --mos-peach-dark:#FFD1AB;
    --mos-shadow:0 1px 3px 0 rgba(124,113,107,.08),0 1px 2px 0 rgba(124,113,107,.04);
    --radius:12px;
  }
  html.dark {
    --mos-bg:#1C1917; --mos-bg-card:#292524; --mos-bg-subtle:#2E2926; --mos-bg-hover:#3B3634;
    --mos-text:#E7E5E4; --mos-text-secondary:#D6D3D1; --mos-text-muted:#A8A29E;
    --mos-brown:#A8A29E; --mos-brown-dark:#78716C; --mos-border:#44403C;
    --mos-peach:#3B2F2B; --mos-peach-dark:#57413A;
    --mos-shadow:0 1px 3px 0 rgba(0,0,0,.3),0 1px 2px 0 rgba(0,0,0,.2);
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:'Lato',sans-serif; background:var(--mos-bg); color:var(--mos-text);
    transition:background-color .3s ease,color .3s ease; -webkit-font-smoothing:antialiased; }
  .wrap { max-width:1180px; margin:0 auto; padding:2rem 1.25rem 4rem; }
  h1 { font-size:2rem; font-weight:900; margin:0; }
  h2 { font-size:1.4rem; font-weight:700; margin:0; }
  .muted { color:var(--mos-text-muted); }
  .sec { color:var(--mos-text-secondary); }
  .card { background:var(--mos-bg-card); border:1px solid var(--mos-border); border-radius:var(--radius);
    box-shadow:var(--mos-shadow); padding:1.75rem; }
  .card.tile { padding:1.25rem; }
  .row { display:flex; flex-wrap:wrap; gap:.75rem; align-items:center; }
  .between { display:flex; justify-content:space-between; align-items:flex-start; gap:1rem; flex-wrap:wrap; }
  .grid { display:grid; gap:1rem; }
  .stack { display:flex; flex-direction:column; gap:1.5rem; }
  .btn { padding:.45rem .85rem; border-radius:8px; font:inherit; font-size:.85rem; font-weight:700;
    cursor:pointer; border:1px solid var(--mos-border); background:var(--mos-bg-card); color:var(--mos-text-secondary); }
  .btn.active { background:var(--mos-brown); color:#fff; border-color:var(--mos-brown); }
  .seg { display:inline-flex; gap:0; border:1px solid var(--mos-border); border-radius:9px; overflow:hidden; background:var(--mos-bg-card); }
  .seg .btn { border:0; border-radius:0; }
  .seg .btn:not(:last-child){ border-right:1px solid var(--mos-border); }
  .chip { width:2.5rem; height:2.5rem; border-radius:8px; background:var(--mos-peach);
    display:flex; align-items:center; justify-content:center; color:var(--mos-brown); flex:0 0 auto; }
  .chip .pi { font-size:1.05rem; }
  .badge { font-size:.62rem; font-weight:700; text-transform:uppercase; letter-spacing:.04em;
    padding:.15rem .5rem; border-radius:999px; color:var(--mos-brown-dark); background:var(--mos-peach); }
  .banner { display:flex; gap:.75rem; align-items:flex-start; background:var(--mos-peach);
    color:var(--mos-brown-dark); border-radius:var(--radius); padding:.85rem 1rem; font-size:.9rem; }
  .kpi-label { font-size:.82rem; font-weight:500; color:var(--mos-text-muted); }
  .kpi-val { font-size:1.9rem; font-weight:900; line-height:1; margin-top:.45rem; color:var(--mos-text); }
  .hint { font-size:.82rem; color:var(--mos-text-secondary); margin-top:.4rem; }
  .hero-val { font-size:2.4rem; font-weight:900; margin-top:.5rem; }
  .bar-track { width:100%; height:.6rem; border-radius:999px; background:var(--mos-bg-hover); overflow:hidden; }
  .bar-fill { height:100%; border-radius:999px; transition:width .5s ease; }
  .lbl { font-size:.82rem; font-weight:700; color:var(--mos-text-secondary); margin:0 0 1rem; }
  .legend { display:flex; flex-wrap:wrap; gap:.5rem 1rem; }
  .legend span { display:inline-flex; align-items:center; gap:.4rem; font-size:.75rem; color:var(--mos-text-muted); }
  .sw { width:.75rem; height:.75rem; border-radius:3px; display:inline-block; }
  .pulse-track { display:flex; width:100%; height:1rem; border-radius:999px; overflow:hidden; background:var(--mos-bg-hover); }
  .pulse-track > div { height:100%; transition:width .5s ease; }
  canvas { max-width:100%; }
  a { color:var(--mos-brown); }
  /* responsive cols */
  .c12{grid-column:span 12} .c6{grid-column:span 6} .c4{grid-column:span 4}
  .c3{grid-column:span 3} .c7{grid-column:span 7} .c5{grid-column:span 5} .c8{grid-column:span 8}
  .g12{grid-template-columns:repeat(12,1fr)}
  @media (max-width:780px){ .c3,.c4,.c5,.c6,.c7,.c8{grid-column:span 12} h1{font-size:1.6rem} }
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
/* ---------- demo data (ported from the app's demoMetrics) ---------- */
const COMPANY = "Northwind Logistics";
const CATEGORICAL = ['#9D8675','#C18C5D','#8FA47E','#7C9DB0','#B98B6E','#A88FA0','#C9A66B'];
const PULSE_PAL = ['#C2553F','#D08C50','#C9B79C','#8FA47E','#5E8C6A'];
const PULSE_SCALE = ['Not Great','Could Be Better','Okay','Pretty Good','Excellent'];
const HR_CATS = ['Sleep','Movement','Nutrition','Stress management','Recovery','Focus & productivity','Outdoor & daylight'];

function makeRng(seed){let a=seed>>>0;return()=>{a|=0;a=(a+0x6d2b79f5)|0;let t=Math.imul(a^(a>>>15),1|a);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296;};}
const SEEDS={thriving:1207,steady:5309,struggling:8821};
const PROFILES={
  thriving:{invited:350,cr:.89,onb:.87,conn:.64,wau:.67,chats:6.4,days:4.3,her:71,p3:52,p5:28,apu:4.6,pulse:3.9,trend:.04},
  steady:{invited:350,cr:.68,onb:.74,conn:.51,wau:.55,chats:4.1,days:3.2,her:52,p3:33,p5:15,apu:2.9,pulse:3.4,trend:.015},
  struggling:{invited:350,cr:.40,onb:.55,conn:.34,wau:.33,chats:2.3,days:2.1,her:31,p3:14,p5:5,apu:1.7,pulse:2.9,trend:-.01},
};
const SCENARIOS=[{id:'thriving',label:'Thriving'},{id:'steady',label:'Steady'},{id:'struggling',label:'Needs a nudge'}];

function mondays(weeks){const now=new Date();const off=(now.getDay()+6)%7;const m=new Date(now);m.setHours(0,0,0,0);m.setDate(now.getDate()-off);const out=[];for(let i=weeks-1;i>=0;i--){const d=new Date(m);d.setDate(m.getDate()-i*7);out.push(d);}return out;}
const fmt=d=>d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
function trend(weeks,end,drift,rng,{round=true,min=0,max=Infinity}={}){const n=weeks.length;const start=end*(1-drift*(n-1));return weeks.map((d,i)=>{const base=start+(end-start)*(i/Math.max(1,n-1));const jit=(rng()-.5)*end*.12;let v=Math.min(max,Math.max(min,base+jit));return{label:fmt(d),value:round?Math.round(v):Math.round(v*10)/10};});}

function buildMetrics(scn,weeksN){
  const p=PROFILES[scn], rng=makeRng(SEEDS[scn]+weeksN), W=mondays(weeksN);
  const accounts=Math.round(p.invited*p.cr), onboarded=Math.round(accounts*p.onb), connected=Math.round(accounts*p.conn);
  const wau=Math.round(accounts*p.wau);
  const provSplit=[['Apple Health',.46],['Oura',.22],['Garmin',.19],['Whoop',.13]];
  const adoption={invited:p.invited,accounts,cr:Math.round(p.cr*100),onboarded,onbRate:Math.round(p.onb*100),
    connected,connRate:Math.round(p.conn*100),
    providers:provSplit.map(([name,w])=>({name,users:Math.round(connected*w*(.9+rng()*.2))})),
    toInteraction:Math.round((1.2+(1-p.cr)*6)*10)/10, toAction:Math.round((2.8+(1-p.her/100)*9)*10)/10};
  const engagement={enrolled:accounts,wau,wauPct:Math.round(p.wau*100),chats:Math.round(p.chats*10)/10,
    days:Math.round(p.days*10)/10,proactive:Math.round(wau*(1.8+rng()*.6)),initiated:Math.round(wau*(1.1+rng()*.5)),
    wauTrend:trend(W,wau,p.trend,rng,{min:0,max:accounts})};
  const pNone=Math.max(0,100-p.her),p12=Math.max(0,p.her-p.p3),p34=Math.max(0,p.p3-p.p5);
  const tu=pct=>Math.round(pct/100*wau);
  const actions={apu:Math.round(p.apu*10)/10,her:p.her,p3:p.p3,p5:p.p5,
    herTrend:trend(W,p.her,p.trend*1.3,rng,{min:0,max:100}),
    dist:[['0',tu(pNone)],['1-2',tu(p12)],['3-4',tu(p34)],['5+',tu(p.p5)]]};
  const wts=[.20,.19,.16,.14,.10,.13,.08], totC=Math.round(accounts*p.apu*2.4);
  const insight=HR_CATS.map((c,i)=>({cat:c,completions:Math.round(totC*wts[i]*(.9+rng()*.2))}));
  const bcats=['Fitness access','Mental health','Healthy food','Movement & ergonomics','Recovery time','Preventive screening'];
  const benefits=bcats.map(c=>{const s=Math.round(wau*(.18+rng()*.22));return{cat:c,suggested:s,engaged:Math.round(s*(.34+rng()*.3))};});
  const Q=[['energy','How has your energy been this week?',0],['sleep','How has your sleep been this week?',-.2],
    ['focus','How has your focus at work been this week?',.1],['stress','How have you managed stress this week?',-.1],
    ['moments',"How do you feel about the moments you've made for your health this week?",.15]];
  const responders=Math.round(accounts*p.wau*.7);
  const pulse=Q.map(([k,q,adj])=>{const mean=Math.min(5,Math.max(1,p.pulse+adj));
    const wsum=PULSE_SCALE.map((_,i)=>Math.exp(-Math.pow(Math.abs(i+1-mean),2)/1.1)*(.85+rng()*.3));
    const tot=wsum.reduce((a,b)=>a+b,0);const counts=wsum.map(w=>Math.round(w/tot*responders));
    const responses=counts.reduce((a,b)=>a+b,0);
    const avg=responses?Math.round(counts.reduce((a,c,i)=>a+c*(i+1),0)/responses*10)/10:0;
    return{q,counts,responses,avg};});
  return{adoption,engagement,actions,insight,benefits,pulse,responseRate:accounts?Math.round(responders/accounts*100):0};
}

/* ---------- rendering ---------- */
let state={scn:'steady',weeks:8,dark:false};
let charts=[];
const css=v=>getComputedStyle(document.documentElement).getPropertyValue(v).trim();
const n=x=>x.toLocaleString('en-US');

function chartColors(){return{text:css('--mos-text'),sec:css('--mos-text-secondary'),mut:css('--mos-text-muted'),
  border:css('--mos-border'),brown:css('--mos-brown'),brownDark:css('--mos-brown-dark'),peach:css('--mos-peach'),
  peachDark:css('--mos-peach-dark'),hover:css('--mos-bg-hover'),card:css('--mos-bg-card')};}
function alpha(hex,a){const h=hex.replace('#','');return`rgba(${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)},${a})`;}

function tile(label,val,icon,hint){return `<div class="card tile"><div class="between"><div>
  <div class="kpi-label">${label}</div><div class="kpi-val">${val}</div></div>
  ${icon?`<div class="chip"><i class="pi pi-${icon}"></i></div>`:''}</div>
  ${hint?`<div class="hint">${hint}</div>`:''}</div>`;}

function sectionCard(title,sub,inner){return `<section class="card"><div style="margin-bottom:1.25rem">
  <div class="row" style="gap:.5rem"><h2>${title}</h2><span class="badge">Sample data</span></div>
  ${sub?`<p class="muted" style="font-size:.9rem;margin:.35rem 0 0;max-width:42rem">${sub}</p>`:''}</div>${inner}</section>`;}

function render(){
  charts.forEach(c=>c.destroy()); charts=[];
  document.documentElement.classList.toggle('dark',state.dark);
  const m=buildMetrics(state.scn,state.weeks);
  const app=document.getElementById('app');

  const segScn=`<div class="seg">${SCENARIOS.map(s=>`<button class="btn ${state.scn===s.id?'active':''}" data-scn="${s.id}">${s.label}</button>`).join('')}</div>`;
  const segWk=`<div class="seg">${[4,8,12].map(w=>`<button class="btn ${state.weeks===w?'active':''}" data-wk="${w}">${w}w</button>`).join('')}</div>`;

  app.innerHTML = `
    <div class="between" style="margin-bottom:1rem">
      <div><h1>Company Metrics</h1><p class="muted" style="margin:.4rem 0 0;font-size:.9rem">${COMPANY} · last ${state.weeks} weeks · interactive demo</p></div>
      <div class="row">${segWk}<button class="btn" id="darkBtn">${state.dark?'Light':'Dark'}</button></div>
    </div>
    <div class="row" style="margin-bottom:1.25rem"><span class="lbl" style="margin:0">Scenario</span>${segScn}</div>
    <div class="banner" style="margin-bottom:1.5rem"><i class="pi pi-sparkles" style="margin-top:.15rem"></i>
      <div><strong>Interactive demo.</strong> Illustrative numbers for a fictional company — switch scenarios to see different rollout states. In a real organization these update from live data.</div></div>

    <div class="grid g12" style="margin-bottom:2rem">
      <div class="c4"><div class="card" style="background:linear-gradient(135deg,var(--mos-peach),var(--mos-bg-card))">
        <div class="kpi-label" style="color:var(--mos-brown-dark)">Enrolled employees</div>
        <div class="hero-val">${n(m.engagement.enrolled)}</div><div class="hint">of ${n(m.adoption.invited)} invited</div></div></div>
      <div class="c4"><div class="card"><div class="kpi-label">Weekly active</div>
        <div class="hero-val">${m.engagement.wauPct}%</div><div class="hint">${n(m.engagement.wau)} this week</div></div></div>
      <div class="c4"><div class="card"><div class="kpi-label">Health Execution Rate</div>
        <div class="hero-val">${m.actions.her}%</div><div class="hint">complete ≥1 action / week</div></div></div>
    </div>

    <div class="stack">
      ${sectionCard('Adoption','How many invited employees are signing up, finishing onboarding, and connecting their data.',`
        <div class="grid g12" style="margin-bottom:1.5rem">
          <div class="c3">${tile('Employees invited',n(m.adoption.invited),'send','')}</div>
          <div class="c3">${tile('Accounts created',n(m.adoption.accounts),'user-plus',m.adoption.cr+'% of invited')}</div>
          <div class="c3">${tile('Onboarding complete',n(m.adoption.onboarded),'check-circle',m.adoption.onbRate+'% of accounts')}</div>
          <div class="c3">${tile('Connected a device',n(m.adoption.connected),'link',m.adoption.connRate+'% of accounts')}</div>
        </div>
        <div class="grid g12">
          <div class="c7"><p class="lbl">Activation funnel</p>${funnel(m.adoption)}
            <div class="grid g12" style="margin-top:1.5rem"><div class="c6"><div class="kpi-val" style="font-size:1.4rem">${m.adoption.toInteraction}d</div><div class="hint">Avg. invite → first chat</div></div>
            <div class="c6"><div class="kpi-val" style="font-size:1.4rem">${m.adoption.toAction}d</div><div class="hint">Avg. invite → first action</div></div></div></div>
          <div class="c5"><p class="lbl">Connected data sources</p><div style="height:230px"><canvas id="ch_prov"></canvas></div></div>
        </div>`)}

      ${sectionCard('Engagement','How actively employees are using their AI Health Partner each week.',`
        <div class="grid g12" style="margin-bottom:1.5rem">
          <div class="c3">${tile('Weekly active users',n(m.engagement.wau),'bolt',m.engagement.wauPct+'% of enrolled')}</div>
          <div class="c3">${tile('Chats / user / week',m.engagement.chats,'comments','')}</div>
          <div class="c3">${tile('Days active / week',m.engagement.days,'calendar','')}</div>
          <div class="c3">${tile('Proactive check-ins',n(m.engagement.proactive),'bell','Started by Mos')}</div>
        </div>
        <div class="grid g12">
          <div class="c8"><p class="lbl">Weekly active users over time</p><div style="height:260px"><canvas id="ch_wau"></canvas></div></div>
          <div class="c4"><p class="lbl">Conversation mix</p><div style="height:180px"><canvas id="ch_mix"></canvas></div>
            <div style="margin-top:1rem">
              <div class="between" style="font-size:.85rem"><span class="sec"><span class="sw" style="background:var(--mos-brown)"></span> Employee-initiated</span><b>${n(m.engagement.initiated)}</b></div>
              <div class="between" style="font-size:.85rem;margin-top:.4rem"><span class="sec"><span class="sw" style="background:var(--mos-peach-dark)"></span> Mos proactive</span><b>${n(m.engagement.proactive)}</b></div>
            </div></div>
        </div>`)}

      ${sectionCard('Health Execution Rate','The share of employees actually completing healthy actions each week — Mos’s core outcome metric.',`
        <div class="grid g12" style="margin-bottom:1.5rem">
          <div class="c4"><div class="card tile" style="height:100%">
            <div class="kpi-label">Completing ≥1 action / week</div>
            <div class="hero-val">${m.actions.her}<span style="font-size:1.4rem;color:var(--mos-brown)">%</span></div>
            <div class="bar-track" style="margin-top:.75rem"><div class="bar-fill" style="width:${m.actions.her}%;background:var(--mos-brown)"></div></div>
            <div class="hint">${m.actions.apu} actions per active user each week</div></div></div>
          <div class="c8"><div class="grid" style="grid-template-columns:repeat(3,1fr);height:100%">
            ${tile('≥1 / week',m.actions.her+'%','check','')}${tile('≥3 / week',m.actions.p3+'%','check-circle','')}${tile('≥5 / week',m.actions.p5+'%','verified','')}</div></div>
        </div>
        <div class="grid g12">
          <div class="c7"><p class="lbl">Health Execution Rate over time</p><div style="height:240px"><canvas id="ch_her"></canvas></div></div>
          <div class="c5"><p class="lbl">Weekly actions per active user</p><div style="height:240px"><canvas id="ch_dist"></canvas></div></div>
        </div>`)}

      ${sectionCard('Where employees focus','Completed Daily Wins grouped into health categories — shows what your team is actually working on.',`
        <div style="height:300px"><canvas id="ch_cat"></canvas></div>`)}

      ${sectionCard('Employer benefits','How often Mos surfaces your company benefits and how often employees act on them.',`
        <div class="grid g12" style="margin-bottom:1.5rem">
          <div class="c4">${tile('Benefit nudges / week',n(m.benefits.reduce((a,b)=>a+b.suggested,0)),'megaphone','Times Mos surfaced a benefit')}</div>
          <div class="c4">${tile('Benefit engagements / week',n(m.benefits.reduce((a,b)=>a+b.engaged,0)),'heart','Times an employee acted')}</div>
          <div class="c4">${tile('Engagement rate',Math.round(m.benefits.reduce((a,b)=>a+b.engaged,0)/Math.max(1,m.benefits.reduce((a,b)=>a+b.suggested,0))*100)+'%','percentage','Of benefits surfaced')}</div>
        </div>
        <p class="lbl">Surfaced vs. engaged, by benefit category</p><div style="height:280px"><canvas id="ch_ben"></canvas></div>`)}

      ${sectionCard('Weekly pulse','Two quick check-ins a week (Wed & Fri). '+m.responseRate+'% of employees responded this week.',`
        <div class="legend" style="margin-bottom:1.5rem">${PULSE_SCALE.map((s,i)=>`<span><span class="sw" style="background:${PULSE_PAL[i]}"></span>${s}</span>`).join('')}</div>
        <div style="display:flex;flex-direction:column;gap:1.25rem">${m.pulse.map(q=>{const tot=q.counts.reduce((a,b)=>a+b,0)||1;
          return `<div><div class="between" style="margin-bottom:.5rem"><span style="font-size:.9rem;font-weight:500">${q.q}</span>
          <span class="muted" style="font-size:.85rem"><b style="color:var(--mos-text)">${q.avg.toFixed(1)}</b> / 5 · ${n(q.responses)} replies</span></div>
          <div class="pulse-track">${q.counts.map((c,i)=>`<div title="${PULSE_SCALE[i]}: ${c}" style="width:${(c/tot*100).toFixed(1)}%;background:${PULSE_PAL[i]}"></div>`).join('')}</div></div>`;}).join('')}</div>`)}
    </div>
    <p class="muted" style="text-align:center;font-size:.8rem;margin-top:2.5rem">Mos Health · Company Metrics — interactive demo · sample data</p>
  `;

  buildCharts(m);
  app.querySelectorAll('[data-scn]').forEach(b=>b.onclick=()=>{state.scn=b.dataset.scn;render();});
  app.querySelectorAll('[data-wk]').forEach(b=>b.onclick=()=>{state.weeks=+b.dataset.wk;render();});
  document.getElementById('darkBtn').onclick=()=>{state.dark=!state.dark;render();};
}

function funnel(a){const rows=[['Invited',a.invited,100,'var(--mos-brown-dark)'],
  ['Account created',a.accounts,Math.round(a.accounts/a.invited*100),'var(--mos-brown)'],
  ['Onboarding complete',a.onboarded,Math.round(a.onboarded/a.invited*100),'var(--mos-peach-dark)']];
  return `<div style="display:flex;flex-direction:column;gap:1rem">${rows.map(([l,c,pct,col])=>`<div>
    <div class="between" style="margin-bottom:.4rem"><span style="font-size:.88rem;font-weight:500">${l}</span>
    <span class="muted" style="font-size:.85rem">${n(c)} <span class="sec">· ${pct}%</span></span></div>
    <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div></div>`).join('')}</div>`;}

function baseAxes(c,pctY){return{x:{ticks:{color:c.mut},grid:{display:false},border:{display:false}},
  y:{beginAtZero:true,ticks:{color:c.mut,...(pctY?{callback:v=>v+'%'}:{precision:0})},grid:{color:c.border,drawTicks:false},border:{display:false}}};}

function buildCharts(m){
  const c=chartColors();
  const mk=(id,cfg)=>{const el=document.getElementById(id);if(el)charts.push(new Chart(el,cfg));};

  mk('ch_prov',{type:'bar',data:{labels:m.adoption.providers.map(p=>p.name),datasets:[{data:m.adoption.providers.map(p=>p.users),backgroundColor:CATEGORICAL.slice(0,4),borderRadius:6,barThickness:22}]},
    options:{indexAxis:'y',maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:c.mut,precision:0},grid:{color:c.border,drawTicks:false},border:{display:false}},y:{ticks:{color:c.sec,font:{size:13}},grid:{display:false},border:{display:false}}}}});

  mk('ch_wau',{type:'line',data:{labels:m.engagement.wauTrend.map(p=>p.label),datasets:[{data:m.engagement.wauTrend.map(p=>p.value),borderColor:c.brown,backgroundColor:alpha(c.brown,.14),fill:true,tension:.4,borderWidth:2.5,pointRadius:0,pointHoverRadius:5}]},
    options:{maintainAspectRatio:false,plugins:{legend:{display:false}},scales:baseAxes(c,false)}});

  mk('ch_mix',{type:'doughnut',data:{labels:['Employee-initiated','Mos proactive'],datasets:[{data:[m.engagement.initiated,m.engagement.proactive],backgroundColor:[c.brown,c.peachDark],borderColor:c.card,borderWidth:3}]},
    options:{maintainAspectRatio:false,cutout:'64%',plugins:{legend:{display:false}}}});

  mk('ch_her',{type:'line',data:{labels:m.actions.herTrend.map(p=>p.label),datasets:[{data:m.actions.herTrend.map(p=>p.value),borderColor:c.brown,backgroundColor:alpha(c.brown,.14),fill:true,tension:.4,borderWidth:2.5,pointRadius:0,pointHoverRadius:5}]},
    options:{maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{...baseAxes(c,true),y:{...baseAxes(c,true).y,max:100}}}});

  mk('ch_dist',{type:'bar',data:{labels:m.actions.dist.map(d=>d[0]),datasets:[{data:m.actions.dist.map(d=>d[1]),backgroundColor:[c.hover,c.peachDark,c.brown,c.brownDark],borderRadius:6,barThickness:40}]},
    options:{maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{title:i=>i[0].label+' actions/week'}}},scales:{x:{ticks:{color:c.sec},grid:{display:false},border:{display:false}},...{y:baseAxes(c,false).y}}}});

  const cats=[...m.insight].sort((a,b)=>b.completions-a.completions);
  mk('ch_cat',{type:'bar',data:{labels:cats.map(x=>x.cat),datasets:[{data:cats.map(x=>x.completions),backgroundColor:cats.map((_,i)=>CATEGORICAL[i%CATEGORICAL.length]),borderRadius:6,barThickness:24}]},
    options:{indexAxis:'y',maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:c.mut,precision:0},grid:{color:c.border,drawTicks:false},border:{display:false}},y:{ticks:{color:c.sec,font:{size:13}},grid:{display:false},border:{display:false}}}}});

  mk('ch_ben',{type:'bar',data:{labels:m.benefits.map(b=>b.cat),datasets:[
    {label:'Surfaced',data:m.benefits.map(b=>b.suggested),backgroundColor:c.peachDark,borderRadius:5,barThickness:16},
    {label:'Engaged',data:m.benefits.map(b=>b.engaged),backgroundColor:c.brown,borderRadius:5,barThickness:16}]},
    options:{maintainAspectRatio:false,plugins:{legend:{position:'top',align:'end',labels:{color:c.sec,usePointStyle:true,pointStyle:'circle',boxWidth:8}}},scales:{x:{ticks:{color:c.mut,font:{size:11}},grid:{display:false},border:{display:false}},...{y:baseAxes(c,false).y}}}});
}

render();
</script>
</body>
</html>
